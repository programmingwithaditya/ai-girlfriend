<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="text-zinc-100 flex flex-col chat-height overflow-hidden">

  <header class="glass-header flex items-center gap-3 px-4 shrink-0 safe-top relative z-10">
    <div class="relative shrink-0">
      <div id="avatar" class="w-11 h-11 rounded-full avatar-gradient flex items-center justify-center text-base font-bold text-white">?</div>
      <span class="online-dot"></span>
    </div>
    <div class="min-w-0">
      <div id="personaName" class="font-semibold text-white leading-none truncate tracking-wide">...</div>
      <div class="text-xs text-emerald-400 mt-0.5 font-medium">online</div>
    </div>
    <button id="resetBtn" class="ml-auto shrink-0 text-xs text-zinc-600 hover:text-zinc-400 active:text-zinc-300 transition-colors px-2 py-3">clear</button>
  </header>

  <main id="messages" class="flex-1 overflow-y-auto px-4 py-5 space-y-3 relative z-10 custom-scroll"></main>

  <footer class="glass-footer shrink-0 px-4 pt-3 safe-bottom relative z-10">
    <div class="flex items-end gap-3 input-wrap px-4 py-2.5">
      <textarea
        id="input"
        rows="1"
        placeholder="Message..."
        class="flex-1 bg-transparent resize-none outline-none text-zinc-100 placeholder-zinc-500 leading-6 max-h-32 overflow-y-auto input-text"
      ></textarea>
      <button
        id="sendBtn"
        class="shrink-0 send-btn disabled:opacity-40 disabled:cursor-not-allowed text-white rounded-full w-10 h-10 flex items-center justify-center transition-all"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 translate-x-px">
          <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
        </svg>
      </button>
    </div>
    <p class="text-xs text-zinc-700 mt-1.5 px-1 pb-2 hidden sm:block">Enter to send &middot; Shift+Enter for newline</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
