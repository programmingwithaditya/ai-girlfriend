<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-zinc-950 text-zinc-100 flex flex-col chat-height">

  <header class="flex items-center gap-3 px-4 py-3 border-b border-zinc-800 shrink-0 safe-top">
    <div id="avatar" class="w-10 h-10 rounded-full bg-rose-500 flex items-center justify-center text-sm font-bold shrink-0">?</div>
    <div class="min-w-0">
      <div id="personaName" class="font-semibold text-zinc-100 leading-none truncate">...</div>
      <div class="text-xs text-zinc-500 mt-0.5">always here</div>
    </div>
    <button id="resetBtn" class="ml-auto shrink-0 text-xs text-zinc-600 active:text-zinc-300 transition-colors px-2 py-2">clear chat</button>
  </header>

  <main id="messages" class="flex-1 overflow-y-auto px-4 py-5 space-y-4"></main>

  <footer class="shrink-0 border-t border-zinc-800 px-4 py-3 safe-bottom">
    <div class="flex items-end gap-2 bg-zinc-900 rounded-xl px-3 py-2">
      <textarea
        id="input"
        rows="1"
        placeholder="Say something..."
        class="flex-1 bg-transparent resize-none outline-none text-zinc-100 placeholder-zinc-600 leading-6 max-h-36 overflow-y-auto input-text"
      ></textarea>
      <button
        id="sendBtn"
        class="shrink-0 bg-rose-500 active:bg-rose-600 disabled:opacity-40 disabled:cursor-not-allowed text-white rounded-lg px-4 py-2 text-sm font-medium transition-colors min-h-[40px]"
      >Send</button>
    </div>
    <p class="text-xs text-zinc-700 mt-1.5 px-1 hidden sm:block">Enter to send &middot; Shift+Enter for newline</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
